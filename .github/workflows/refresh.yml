name: Refresh trade data

# Runs the free public-data fetch in the cloud and commits the updated
# data.js back to the repo. GitHub Pages then redeploys automatically.
# Cost: free on GitHub's free tier. Needs no secrets.

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-trade-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore rolling cache
        uses: actions/cache@v4
        with:
          path: cache
          key: monitor-cache-${{ github.run_id }}
          restore-keys: |
            monitor-cache-

      - name: Fetch data (SEC EDGAR + congressional filings)
        run: python fetch_data.py

      - name: Commit refreshed data.js
        run: |
          git config user.name "trade-monitor-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          if git diff --staged --quiet; then
            echo "No data changes this run."
          else
            git commit -m "Daily data refresh $(date -u +%Y-%m-%d)"
            git push
          fi
